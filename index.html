<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QGA – Quântica Gestão de Almoxarifado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        :root { --primary: #001f3f; --accent: #ffd700; }
        * { transition: all 150ms cubic-bezier(0.4, 0, 0.2, 1); }
        body { font-family: 'Inter', sans-serif; background: #f3f4f6; }
        .logo-font { font-family: 'Space Grotesk', sans-serif; }
        .app-container { background: linear-gradient(135deg, #001f3f 0%, #002b55 100%); }
        .card { background: rgba(255,255,255,0.98); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .row-critical { border-left: 6px solid #ef4444; background-color: #fef2f2; }
    </style>
</head>
<body class="antialiased">

    <div id="login-screen" class="min-h-screen app-container flex items-center justify-center">
        <div class="bg-white rounded-3xl shadow-2xl max-w-md w-full mx-4 overflow-hidden border border-white/20">
            <div class="bg-[#001f3f] px-8 py-10 text-white text-center">
                <div class="flex items-center justify-center gap-3 mb-2">
                    <div class="w-12 h-12 bg-[#ffd700] text-[#001f3f] rounded-2xl flex items-center justify-center text-3xl font-bold logo-font">Q</div>
                    <h1 class="logo-font text-4xl tracking-tighter">QGA</h1>
                </div>
                <p class="text-[#ffd700] font-medium text-xl">Gestão de Almoxarifado</p>
                <p class="text-white/50 mt-1 text-sm italic underline">admin / admin</p>
            </div>
            <div class="px-8 py-8 space-y-5">
                <input id="username" type="text" placeholder="Usuário" class="w-full px-4 py-3 border border-gray-300 rounded-2xl outline-none focus:border-[#ffd700]">
                <input id="password" type="password" placeholder="Senha" class="w-full px-4 py-3 border border-gray-300 rounded-2xl outline-none focus:border-[#ffd700]">
                <button onclick="handleLogin()" class="w-full bg-[#001f3f] hover:bg-[#002b55] text-white font-semibold py-4 rounded-3xl text-lg shadow-lg">Entrar no Sistema</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden min-h-screen flex flex-col">
        <header class="bg-[#001f3f] text-white h-16 flex items-center px-6 shadow-xl z-50">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-[#ffd700] text-[#001f3f] rounded-xl flex items-center justify-center text-xl font-bold logo-font">Q</div>
                <span class="logo-font text-xl">QGA</span>
            </div>
            <nav class="flex-1 flex justify-center gap-8 text-sm font-medium">
                <button onclick="navigateTo('dashboard')" class="hover:text-[#ffd700]">Dashboard</button>
                <button onclick="navigateTo('estoque')" class="hover:text-[#ffd700]">Estoque</button>
                <button onclick="navigateTo('solicitacoes')" class="hover:text-[#ffd700]">Solicitações</button>
                <button onclick="navigateTo('relatorios')" class="hover:text-[#ffd700]">Relatórios</button>
            </nav>
            <div class="flex items-center gap-4">
                <div class="text-right leading-tight">
                    <p id="user-name" class="text-sm font-bold"></p>
                    <p id="user-role" class="text-[10px] text-[#ffd700] uppercase tracking-widest"></p>
                </div>
                <button onclick="logout()" class="p-2 bg-white/10 hover:bg-red-500 rounded-xl">🚪</button>
            </div>
        </header>

        <div class="flex flex-1 overflow-hidden">
            <aside class="w-72 bg-white shadow-2xl flex flex-col p-6 border-r border-gray-100">
                <div class="mb-8">
                    <h3 class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">Patrimônio em Estoque</h3>
                    <p id="total-value" class="text-2xl font-bold text-[#001f3f]">R$ 0,00</p>
                    <div class="h-1.5 bg-gray-100 rounded-full mt-3 overflow-hidden">
                        <div id="total-value-bar" class="h-full bg-[#ffd700] w-0"></div>
                    </div>
                </div>
                <div id="critical-alert" class="hidden p-4 bg-red-50 border-l-4 border-red-500 rounded-r-xl mb-8">
                    <p class="text-red-700 text-xs font-bold flex items-center gap-1">⚠️ ATENÇÃO</p>
                    <p id="critical-text" class="text-red-600 text-[11px] mt-1"></p>
                </div>
            </aside>
            <main id="main-content" class="flex-1 overflow-auto p-8 bg-gray-50"></main>
        </div>
    </div>

    <div id="modal-backdrop" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-[100] backdrop-blur-sm">
        <div id="modal-content" class="bg-white rounded-3xl w-full max-w-lg mx-4 shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-200"></div>
    </div>

    <script>
        let DB = {
            users: [{ id: 1, username: "admin", password: "admin", role: "DIRETORIA", name: "Ricardo Kerber" }],
            products: [
                { id: 1, name: "Uniforme Segurança G", category: "Uniforme", qty: 45, minStock: 20, unitValue: 120.00 },
                { id: 2, name: "Detergente 5L", category: "Limpeza", qty: 5, minStock: 15, unitValue: 35.00 }
            ]
        };

        let currentUser = null;

        const save = () => { localStorage.setItem('qga_db', JSON.stringify(DB)); updateUI(); };
        const formatCurrency = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v);
        const getCritical = () => DB.products.filter(p => p.qty <= p.minStock);

        function handleLogin() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const user = DB.users.find(x => x.username === u && x.password === p);
            if (user) {
                currentUser = user;
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                updateUI();
                navigateTo('dashboard');
            } else alert("Usuário ou senha incorretos.");
        }

        function updateUI() {
            if (!currentUser) return;
            document.getElementById('user-name').textContent = currentUser.name;
            document.getElementById('user-role').textContent = currentUser.role;
            const total = DB.products.reduce((acc, p) => acc + (p.qty * p.unitValue), 0);
            document.getElementById('total-value').textContent = formatCurrency(total);
            document.getElementById('total-value-bar').style.width = Math.min((total/20000)*100, 100) + '%';
            const criticos = getCritical();
            const alertBox = document.getElementById('critical-alert');
            if (criticos.length > 0) {
                alertBox.classList.remove('hidden');
                document.getElementById('critical-text').textContent = `${criticos.length} itens abaixo do mínimo.`;
            } else alertBox.classList.add('hidden');
        }

        function navigateTo(view) {
            const main = document.getElementById('main-content');
            if (view === 'dashboard') {
                main.innerHTML = `
                    <h1 class="text-3xl font-bold text-[#001f3f] mb-6">Resumo Operacional</h1>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="card p-6 rounded-3xl">
                            <p class="text-gray-400 text-xs font-bold uppercase">Itens no Catálogo</p>
                            <p class="text-4xl font-bold text-[#001f3f] mt-1">${DB.products.length}</p>
                        </div>
                        <div class="card p-6 rounded-3xl border-l-8 border-red-500">
                            <p class="text-gray-400 text-xs font-bold uppercase">Estoque Crítico</p>
                            <p class="text-4xl font-bold text-red-600 mt-1">${getCritical().length}</p>
                        </div>
                    </div>
                `;
            } else if (view === 'estoque') {
                renderEstoque();
            } else if (view === 'solicitacoes') {
                main.innerHTML = `
                    <h1 class="text-3xl font-bold text-[#001f3f] mb-6">Aba de Solicitações</h1>
                    <div class="card p-8 rounded-3xl space-y-6">
                        <div class="flex items-start gap-4">
                            <span class="text-4xl">📋</span>
                            <div>
                                <h2 class="text-xl font-bold text-[#001f3f]">O que é esta aba?</h2>
                                <p class="text-gray-600 mt-2">Esta é a central de comunicação entre os <strong>Supervisores de Campo</strong> e o <strong>Almoxarifado</strong>.</p>
                            </div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-6">
                            <div class="p-4 bg-blue-50 rounded-2xl border border-blue-100">
                                <h3 class="font-bold text-blue-800">1. Pedidos Externos</h3>
                                <p class="text-sm text-blue-700">Quando um funcionário no posto precisa de um novo uniforme ou material de limpeza, o supervisor abre uma "Solicitação" aqui.</p>
                            </div>
                            <div class="p-4 bg-amber-50 rounded-2xl border border-amber-100">
                                <h3 class="font-bold text-amber-800">2. Fluxo de Aprovação</h3>
                                <p class="text-sm text-amber-700">O pedido aparece para o Almoxarife, que verifica se há estoque, separa o material e marca como "Entregue".</p>
                            </div>
                        </div>
                        <p class="text-sm italic text-gray-400">Esta aba garante que nada saia do almoxarifado sem uma requisição oficial vinculada a um setor.</p>
                    </div>`;
            } else if (view === 'relatorios') {
                main.innerHTML = `
                    <h1 class="text-3xl font-bold text-[#001f3f] mb-6">Relatórios</h1>
                    <div onclick="exportEstoquePDF()" class="card p-8 rounded-3xl cursor-pointer hover:bg-gray-50 flex items-center gap-4 max-w-md">
                        <span class="text-4xl">📄</span>
                        <div><p class="font-bold">PDF de Estoque Atual</p><p class="text-xs text-gray-500">Lista completa com valores totais</p></div>
                    </div>`;
            }
        }

        function renderEstoque() {
            const main = document.getElementById('main-content');
            main.innerHTML = `
                <div class="flex justify-between items-center mb-6">
                    <h1 class="text-3xl font-bold text-[#001f3f]">Controle de Estoque</h1>
                    <div class="flex gap-2">
                        <button onclick="showEntradaModal()" class="bg-green-600 text-white px-4 py-2 rounded-xl font-bold text-sm">📥 Entrada</button>
                        <button onclick="showSaidaModal()" class="bg-blue-600 text-white px-4 py-2 rounded-xl font-bold text-sm">📤 Saída</button>
                        <button onclick="showAddProduct()" class="bg-[#ffd700] text-[#001f3f] px-4 py-2 rounded-xl font-bold text-sm">+ Novo Produto</button>
                    </div>
                </div>
                <div class="card rounded-3xl overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-gray-50 border-b">
                            <tr class="text-[10px] uppercase text-gray-400">
                                <th class="p-6">Produto</th><th class="p-6 text-center">Qtd</th><th class="p-6">V. Unitário</th><th class="p-6">Ações</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${DB.products.map(p => `
                                <tr class="border-b ${p.qty <= p.minStock ? 'row-critical' : ''}">
                                    <td class="p-6">
                                        <p class="font-bold text-[#001f3f]">${p.name}</p>
                                        <span class="text-[10px] text-gray-400 uppercase">${p.category}</span>
                                    </td>
                                    <td class="p-6 text-center font-bold">${p.qty}</td>
                                    <td class="p-6 text-sm text-gray-500">${formatCurrency(p.unitValue)}</td>
                                    <td class="p-6">
                                        <div class="flex gap-2">
                                            <button onclick="editProduct(${p.id})" class="text-blue-600 hover:bg-blue-50 p-2 rounded-lg">✏️</button>
                                            <button onclick="deleteProduct(${p.id})" class="text-red-600 hover:bg-red-50 p-2 rounded-lg">🗑️</button>
                                        </div>
                                    </td>
                                </tr>`).join('')}
                        </tbody>
                    </table>
                </div>`;
        }

        // --- FUNÇÕES DE PRODUTO ---
        function showAddProduct() {
            openModal(`
                <div class="p-8">
                    <h2 class="text-xl font-bold mb-4">Cadastrar Produto</h2>
                    <div class="space-y-3">
                        <input id="p-name" placeholder="Nome do Produto" class="w-full p-3 border rounded-xl outline-none focus:border-[#ffd700]">
                        <input id="p-cat" placeholder="Categoria (ex: Limpeza)" class="w-full p-3 border rounded-xl outline-none">
                        <div class="flex gap-2">
                            <input id="p-qty" type="number" placeholder="Qtd Inicial" class="w-1/2 p-3 border rounded-xl outline-none">
                            <input id="p-min" type="number" placeholder="Estoque Mínimo" class="w-1/2 p-3 border rounded-xl outline-none">
                        </div>
                        <input id="p-val" type="number" placeholder="Valor Unitário R$" class="w-full p-3 border rounded-xl outline-none">
                    </div>
                    <button onclick="saveNewProduct()" class="w-full bg-[#001f3f] text-white mt-6 py-3 rounded-2xl font-bold">Salvar Cadastro</button>
                </div>
            `);
        }

        function editProduct(id) {
            const p = DB.products.find(x => x.id === id);
            openModal(`
                <div class="p-8">
                    <h2 class="text-xl font-bold mb-4">Alterar Produto</h2>
                    <div class="space-y-3">
                        <input id="e-name" value="${p.name}" class="w-full p-3 border rounded-xl outline-none">
                        <input id="e-cat" value="${p.category}" class="w-full p-3 border rounded-xl outline-none">
                        <div class="flex gap-2">
                            <input id="e-qty" type="number" value="${p.qty}" class="w-1/2 p-3 border rounded-xl outline-none">
                            <input id="e-min" type="number" value="${p.minStock}" class="w-1/2 p-3 border rounded-xl outline-none">
                        </div>
                        <input id="e-val" type="number" value="${p.unitValue}" class="w-full p-3 border rounded-xl outline-none">
                    </div>
                    <button onclick="saveEditProduct(${p.id})" class="w-full bg-[#001f3f] text-white mt-6 py-3 rounded-2xl font-bold">Salvar Alterações</button>
                </div>
            `);
        }

        function saveNewProduct() {
            const p = {
                id: Date.now(),
                name: document.getElementById('p-name').value,
                category: document.getElementById('p-cat').value,
                qty: Number(document.getElementById('p-qty').value),
                minStock: Number(document.getElementById('p-min').value),
                unitValue: Number(document.getElementById('p-val').value)
            };
            if(!p.name) return;
            DB.products.push(p);
            save(); closeModal(); renderEstoque();
        }

        function saveEditProduct(id) {
            const p = DB.products.find(x => x.id === id);
            p.name = document.getElementById('e-name').value;
            p.category = document.getElementById('e-cat').value;
            p.qty = Number(document.getElementById('e-qty').value);
            p.minStock = Number(document.getElementById('e-min').value);
            p.unitValue = Number(document.getElementById('e-val').value);
            save(); closeModal(); renderEstoque();
        }

        function deleteProduct(id) {
            if(confirm("Tem certeza que deseja excluir este produto do sistema?")) {
                DB.products = DB.products.filter(p => p.id !== id);
                save(); renderEstoque();
            }
        }

        function showEntradaModal() {
            let options = DB.products.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
            openModal(`
                <div class="p-8">
                    <h2 class="text-xl font-bold mb-4 text-green-700">Registrar Entrada 📥</h2>
                    <select id="mov-id" class="w-full p-3 border rounded-xl mb-3 outline-none">${options}</select>
                    <input id="mov-qty" type="number" placeholder="Quantidade para somar" class="w-full p-3 border rounded-xl outline-none">
                    <button onclick="execMov('entrada')" class="w-full bg-green-600 text-white mt-6 py-3 rounded-2xl font-bold">Confirmar Entrada</button>
                </div>
            `);
        }

        function showSaidaModal() {
            let options = DB.products.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
            openModal(`
                <div class="p-8">
                    <h2 class="text-xl font-bold mb-4 text-blue-700">Registrar Saída 📤</h2>
                    <select id="mov-id" class="w-full p-3 border rounded-xl mb-3 outline-none">${options}</select>
                    <input id="mov-qty" type="number" placeholder="Quantidade para retirar" class="w-full p-3 border rounded-xl outline-none">
                    <button onclick="execMov('saida')" class="w-full bg-blue-600 text-white mt-6 py-3 rounded-2xl font-bold">Confirmar Saída</button>
                </div>
            `);
        }

        function execMov(type) {
            const id = document.getElementById('mov-id').value;
            const qty = Number(document.getElementById('mov-qty').value);
            const product = DB.products.find(p => p.id == id);
            if (type === 'entrada') product.qty += qty;
            else {
                if (product.qty < qty) return alert("Estoque insuficiente!");
                product.qty -= qty;
            }
            save(); closeModal(); renderEstoque();
        }

        function openModal(html) {
            document.getElementById('modal-content').innerHTML = html;
            document.getElementById('modal-backdrop').classList.remove('hidden');
        }
        function closeModal() { document.getElementById('modal-backdrop').classList.add('hidden'); }
        function logout() { location.reload(); }

        function exportEstoquePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("QGA - Relatório de Estoque Atual", 14, 15);
            const data = DB.products.map(p => [p.name, p.category, p.qty, formatCurrency(p.unitValue), formatCurrency(p.qty * p.unitValue)]);
            doc.autoTable({ head: [['Produto', 'Categoria', 'Qtd', 'V. Un', 'V. Total']], body: data, startY: 25 });
            doc.save("estoque-quantica.pdf");
        }

        window.onload = () => {
            const saved = localStorage.getItem('qga_db');
            if (saved) {
                DB = JSON.parse(saved);
                // Garantir que os IDs antigos funcionem com o novo sistema
                DB.products.forEach(p => { if(!p.id) p.id = Math.random(); });
            }
        };
    </script>
</body>
</html>
