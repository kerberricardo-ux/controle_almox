<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QGA – Quântica Gestão de Almoxarifado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        
        :root { --primary: #001f3f; --accent: #ffd700; }
        
        * { transition: all 150ms cubic-bezier(0.4, 0, 0.2, 1); }
        
        body { font-family: 'Inter', sans-serif; }
        .logo-font { font-family: 'Space Grotesk', sans-serif; }
        .app-container { background: linear-gradient(135deg, #001f3f 0%, #002b55 100%); }
        
        .card { background: rgba(255,255,255,0.98); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); }
        
        /* Indicador visual de estoque crítico sem cansar a vista */
        .row-critical { border-left: 6px solid #ef4444; background-color: #fef2f2; }
    </style>
</head>
<body class="antialiased">

    <div id="login-screen" class="min-h-screen app-container flex items-center justify-center">
        <div class="bg-white rounded-3xl shadow-2xl max-w-md w-full mx-4 overflow-hidden">
            <div class="bg-[#001f3f] px-8 py-10 text-white text-center">
                <div class="flex items-center justify-center gap-3 mb-2">
                    <div class="w-12 h-12 bg-[#ffd700] text-[#001f3f] rounded-2xl flex items-center justify-center text-3xl font-bold logo-font">Q</div>
                    <h1 class="logo-font text-4xl tracking-tighter">QGA</h1>
                </div>
                <p class="text-[#ffd700] font-medium text-xl">Quântica Gestão de Almoxarifado</p>
                <p class="text-white/70 mt-1 text-sm">Segurança Patrimonial & Limpeza</p>
            </div>
            
            <div class="px-8 py-8">
                <div class="space-y-5">
                    <input id="username" type="text" placeholder="Usuário" class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:ring-2 focus:ring-[#ffd700] outline-none">
                    <input id="password" type="password" placeholder="Senha" class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:ring-2 focus:ring-[#ffd700] outline-none">
                    <button onclick="handleLogin()" class="w-full bg-[#001f3f] hover:bg-[#002b55] text-white font-semibold py-4 rounded-3xl text-lg">Entrar no Sistema</button>
                </div>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden min-h-screen app-container flex flex-col">
        <header class="bg-[#001f3f] text-white h-16 flex items-center px-6 shadow-xl z-50">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-[#ffd700] text-[#001f3f] rounded-xl flex items-center justify-center text-xl font-bold logo-font">Q</div>
                <span class="logo-font text-xl">QGA</span>
            </div>
            
            <nav class="flex-1 flex justify-center gap-6 text-sm">
                <button onclick="navigateTo('dashboard')" class="hover:text-[#ffd700]">Dashboard</button>
                <button onclick="navigateTo('estoque')" class="hover:text-[#ffd700]">Estoque</button>
                <button onclick="navigateTo('solicitacoes')" class="hover:text-[#ffd700]">Solicitações</button>
                <button onclick="navigateTo('relatorios')" class="hover:text-[#ffd700]">Relatórios</button>
            </nav>
            
            <div class="flex items-center gap-4">
                <div class="text-right">
                    <p id="user-name" class="text-sm font-bold"></p>
                    <p id="user-role" class="text-[10px] text-[#ffd700] uppercase tracking-wider"></p>
                </div>
                <button onclick="logout()" class="p-2 bg-white/10 hover:bg-red-500 rounded-xl">🚪</button>
            </div>
        </header>

        <div class="flex flex-1 overflow-hidden">
            <aside class="w-72 bg-white shadow-2xl flex flex-col p-6 overflow-y-auto">
                <div class="mb-8">
                    <h3 class="text-xs font-bold text-gray-400 uppercase mb-2">Valor em Estoque</h3>
                    <p id="total-value" class="text-3xl font-bold text-[#001f3f] tracking-tight">R$ 0,00</p>
                    <div class="h-1.5 bg-gray-100 rounded-full mt-3 overflow-hidden">
                        <div id="total-value-bar" class="h-full bg-[#ffd700] w-0"></div>
                    </div>
                </div>

                <div id="critical-alert" class="hidden p-4 bg-red-50 border-l-4 border-red-500 rounded-r-xl mb-8">
                    <p class="text-red-700 text-xs font-bold">⚠️ ESTOQUE CRÍTICO</p>
                    <p id="critical-text" class="text-red-600 text-[10px]">0 itens em baixa</p>
                </div>

                <div id="sidebar-menu" class="space-y-1"></div>
            </aside>

            <main id="main-content" class="flex-1 overflow-auto p-8"></main>
        </div>
    </div>

    <div id="modal-backdrop" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-[100] backdrop-blur-sm">
        <div id="modal-content" class="bg-white rounded-3xl w-full max-w-lg mx-4 shadow-2xl overflow-hidden"></div>
    </div>

    <script>
        // DB Inicial
        let DB = {
            users: [
                { id: 1, username: "admin", password: "admin", role: "admin", name: "Ricardo Kerber", sector: "Diretoria" },
                { id: 2, username: "almox", password: "almox", role: "almoxarife", name: "João Silva", sector: "Almoxarifado" }
            ],
            sectors: [{ id: 1, name: "Portaria" }, { id: 2, name: "Limpeza" }, { id: 3, name: "Ronda" }],
            products: [
                { id: "1", name: "Uniforme Segurança G", category: "uniforme", qty: 45, minStock: 20, unitValue: 120.00 },
                { id: "2", name: "Detergente 5L", category: "limpeza", qty: 5, minStock: 15, unitValue: 35.00 }
            ],
            movements: [],
            requests: []
        };

        let currentUser = null;

        // Persistência e Cálculos
        const save = () => localStorage.setItem('qga_db', JSON.stringify(DB));
        const formatCurrency = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v);
        const getCritical = () => DB.products.filter(p => p.qty <= p.minStock);

        function handleLogin() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const user = DB.users.find(user => user.username === u && user.password === p);
            
            if (user) {
                currentUser = user;
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                updateUI();
                navigateTo('dashboard');
            } else {
                alert("Acesso negado");
            }
        }

        function updateUI() {
            document.getElementById('user-name').textContent = currentUser.name;
            document.getElementById('user-role').textContent = currentUser.role;
            
            const total = DB.products.reduce((acc, p) => acc + (p.qty * p.unitValue), 0);
            document.getElementById('total-value').textContent = formatCurrency(total);
            document.getElementById('total-value-bar').style.width = Math.min((total/50000)*100, 100) + '%';
            
            const criticos = getCritical();
            const alertBox = document.getElementById('critical-alert');
            if (criticos.length > 0) {
                alertBox.classList.remove('hidden');
                document.getElementById('critical-text').textContent = `${criticos.length} itens abaixo do mínimo`;
            } else {
                alertBox.classList.add('hidden');
            }
        }

        function navigateTo(view) {
            const main = document.getElementById('main-content');
            updateUI();

            if (view === 'dashboard') {
                main.innerHTML = `
                    <h1 class="text-3xl font-bold text-white mb-6">Resumo Operacional</h1>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="card p-6 rounded-3xl">
                            <p class="text-gray-400 text-xs font-bold uppercase">Itens Ativos</p>
                            <p class="text-4xl font-bold text-[#001f3f] mt-1">${DB.products.length}</p>
                        </div>
                        <div class="card p-6 rounded-3xl border-l-8 border-red-500">
                            <p class="text-gray-400 text-xs font-bold uppercase">Críticos</p>
                            <p class="text-4xl font-bold text-red-600 mt-1">${getCritical().length}</p>
                        </div>
                    </div>
                `;
            } else if (view === 'estoque') {
                main.innerHTML = `
                    <div class="flex justify-between items-center mb-6">
                        <h1 class="text-3xl font-bold text-white">Estoque Geral</h1>
                        <button onclick="showAddProduct()" class="bg-[#ffd700] text-[#001f3f] px-6 py-2 rounded-xl font-bold"> + Novo Produto</button>
                    </div>
                    <div class="mb-4">
                        <input type="text" id="stockSearch" onkeyup="filterStock()" placeholder="🔍 Pesquisar produto..." class="w-full p-4 rounded-2xl outline-none">
                    </div>
                    <div class="card rounded-3xl overflow-hidden">
                        <table class="w-full text-left">
                            <thead class="bg-gray-50 border-b">
                                <tr class="text-[10px] uppercase text-gray-400">
                                    <th class="p-6">Produto</th>
                                    <th class="p-6">Qtd</th>
                                    <th class="p-6">Valor Un.</th>
                                    <th class="p-6">Total</th>
                                </tr>
                            </thead>
                            <tbody id="stock-body">
                                ${DB.products.map(p => `
                                    <tr class="border-b ${p.qty <= p.minStock ? 'row-critical' : ''}">
                                        <td class="p-6 font-bold text-[#001f3f]">${p.name}</td>
                                        <td class="p-6">${p.qty}</td>
                                        <td class="p-6">${formatCurrency(p.unitValue)}</td>
                                        <td class="p-6 font-bold">${formatCurrency(p.qty * p.unitValue)}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                `;
            }
        }

        function filterStock() {
            const q = document.getElementById('stockSearch').value.toLowerCase();
            document.querySelectorAll('#stock-body tr').forEach(row => {
                row.style.display = row.innerText.toLowerCase().includes(q) ? '' : 'none';
            });
        }

        function logout() {
            location.reload();
        }

        // Inicializar
        window.onload = () => {
            const saved = localStorage.getItem('qga_db');
            if (saved) DB = JSON.parse(saved);
        };
    </script>
</body>
</html>
